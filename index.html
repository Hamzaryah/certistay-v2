
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CertiStay Fixed</title>
<style>
body{font-family:Arial;background:#0b0f16;color:#fff;padding:20px}
button,input{width:100%;padding:14px;margin:8px 0;border-radius:12px}
button{background:#e3c17a;border:0}
.screen{display:none}.active{display:block}
</style>
</head>
<body>

<div id="home" class="active screen">
<h1>CertiStay</h1>
<button onclick="show('host')">Entra come host</button>
<button onclick="show('guest')">Simula ospite</button>
</div>

<div id="host" class="screen">
<h2>Host</h2>
<input id="guest" placeholder="Nome ospite">
<input id="booking" placeholder="Codice prenotazione">
<button onclick="createBooking()">Genera</button>
<div id="hostOut"></div>
</div>

<div id="guestScreen" class="screen">
<h2>Ospite</h2>
<input id="guestBooking" placeholder="Codice prenotazione">
<button onclick="openBooking()">Apri</button>
<div id="guestOut"></div>
</div>

<script>
let reservations={};

function show(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 if(id==='guest'){
   document.getElementById('guestScreen').classList.add('active');
 } else {
   document.getElementById(id).classList.add('active');
 }
}

function createBooking(){
 const g=document.getElementById('guest').value;
 const b=document.getElementById('booking').value;

 reservations[b]={guest:g,booking:b};

 document.getElementById('hostOut').innerHTML=
 '<p>Link ospite:</p><p>'+window.location.origin+window.location.pathname+'?booking='+b+'</p>';
}

function openBooking(){
 const b=document.getElementById('guestBooking').value;
 const r=reservations[b];

 if(!r){
   document.getElementById('guestOut').innerHTML='Prenotazione non trovata';
   return;
 }

 document.getElementById('guestOut').innerHTML=
 '<p>'+r.guest+'</p><button onclick="requestCheckin()">Richiedi check-in</button>';
}

function requestCheckin(){
 document.getElementById('guestOut').innerHTML='Check-in autorizzato';
}
</script>

</body>
</html>
